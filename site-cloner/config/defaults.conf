# Site Cloner Default Configuration

# User-Agent for requests
USER_AGENT="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# File types to download
DOWNLOAD_TYPES="css,js,png,jpg,jpeg,gif,svg,webp,ico,woff,woff2,ttf,eot,otf,mp4,webm"

# File types to reject
REJECT_TYPES="mp3,avi,mov,flv,swf"

# Max file size (bytes) - skip files larger than this
MAX_FILE_SIZE=52428800  # 50MB

# Request timeout (seconds)
TIMEOUT=30

# Concurrent downloads
CONCURRENT=4

# Depth for recursive download
DEPTH=2

# Follow redirects
FOLLOW_REDIRECTS=true

# Include external resources (CDN)
INCLUDE_EXTERNAL=true
